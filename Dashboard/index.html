<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Returns Reason Hotspot Report</title>
<style>
  /* ---------- LIGHT (default) ---------- */
  :root{
    --brand:#15243D;      /* header — brand navy, identical in both themes */
    --brand-2:#1E3355;    /* tab strip — one step lighter than the header */
    --brand-3:#2A4470;
    --accent:#2E6DA4;
    --ink:#16202C;
    --ink-2:#54657A;
    --ink-3:#8A9AAB;
    --surface:#FFFFFF;
    --surface-2:#F4F6F9;
    --surface-3:#FAFBFC;
    --line:#DEE4EC;
    --line-2:#EDF1F5;
    --hot:#FDECEC;
    --hot-edge:#C0392B;
    --hot-hover:#FADFDF;
    --kpi-a:#FFFFFF;
    --kpi-b:#F9FBFC;
    --kpi-v:var(--brand);
    --sheen:rgba(255,255,255,.9);
    --th-hover:#EDF1F6;
    --th-sorted:#E9EFF6;
    --row-hover:#EAF1F8;
    --chip-bg:#EAF0F7;
    --chip-ink:#1E3355;
    --track:#E8EDF3;
    --soft-hover:#E9EFF6;
    --tab-plat:#15243D;
    --th-bg:#ECF1F7;
    --th-ink:#3F5169;
    --toolbar:#F7F9FC;
    --focus-ring:rgba(46,109,164,.22);
    --shadow:0 1px 2px rgba(21,36,61,.05),0 4px 16px rgba(21,36,61,.06);
    --scroll-sh:rgba(21,36,61,.13);   /* edge shadow on a sideways-scrollable table */
    --card-sh:0 1px 1px rgba(21,36,61,.04),0 6px 12px -5px rgba(21,36,61,.16),0 12px 24px -10px rgba(21,36,61,.12);
    --card-sh-h:0 2px 2px rgba(21,36,61,.05),0 12px 20px -8px rgba(21,36,61,.22),0 22px 40px -14px rgba(21,36,61,.18);
    --r:10px;
  }

  /* ---------- DARK ---------- */
  /* Dark is a deliberately chosen palette, not an inverted light one. The header
     and tab strip keep the exact brand navy so the identity is stable in both. */
  :root[data-theme="dark"]{
    --ink:#E4EBF3;
    --ink-2:#9FB1C6;
    --ink-3:#71879F;
    --surface:#182231;
    --surface-2:#0E1620;
    --surface-3:#1D2837;
    --line:#2B3A4C;
    --line-2:#243040;
    --accent:#5195D6;
    --hot:#3A2328;
    --hot-edge:#E86A5E;
    --hot-hover:#472A30;
    --kpi-a:#1B2634;
    --kpi-b:#161F2C;
    --kpi-v:#E8EFF8;
    --sheen:rgba(255,255,255,.07);
    --th-hover:#243244;
    --th-sorted:#26374C;
    --row-hover:#22304100;
    --row-hover:#223041;
    --chip-bg:#24354A;
    --chip-ink:#BFD4EC;
    --track:#26313F;
    --soft-hover:#243244;
    --tab-plat:#3A6FA8;
    --th-bg:#202C3D;
    --th-ink:#A7BACF;
    --toolbar:#141D29;
    --focus-ring:rgba(81,149,214,.3);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.34);
    --scroll-sh:rgba(0,0,0,.5);
    --card-sh:0 1px 1px rgba(0,0,0,.35),0 6px 12px -5px rgba(0,0,0,.5),0 12px 24px -10px rgba(0,0,0,.42);
    --card-sh-h:0 2px 2px rgba(0,0,0,.4),0 12px 20px -8px rgba(0,0,0,.58),0 22px 40px -14px rgba(0,0,0,.5);
  }
  /* follow the OS unless the user has explicitly picked a theme */
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){
      --ink:#E4EBF3; --ink-2:#9FB1C6; --ink-3:#71879F;
      --surface:#182231; --surface-2:#0E1620; --surface-3:#1D2837;
      --line:#2B3A4C; --line-2:#243040; --accent:#5195D6;
      --hot:#3A2328; --hot-edge:#E86A5E; --hot-hover:#472A30;
      --kpi-a:#1B2634; --kpi-b:#161F2C; --kpi-v:#E8EFF8;
      --sheen:rgba(255,255,255,.07);
      --th-hover:#243244; --th-sorted:#26374C; --row-hover:#223041;
      --chip-bg:#24354A; --chip-ink:#BFD4EC; --track:#26313F; --soft-hover:#243244; --tab-plat:#3A6FA8;
      --th-bg:#202C3D; --th-ink:#A7BACF; --toolbar:#141D29; --focus-ring:rgba(81,149,214,.3);
      --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.34);
      --scroll-sh:rgba(0,0,0,.5);
      --card-sh:0 1px 1px rgba(0,0,0,.35),0 6px 12px -5px rgba(0,0,0,.5),0 12px 24px -10px rgba(0,0,0,.42);
      --card-sh-h:0 2px 2px rgba(0,0,0,.4),0 12px 20px -8px rgba(0,0,0,.58),0 22px 40px -14px rgba(0,0,0,.5);
    }
  }
  html{color-scheme:light dark}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--surface-2); -webkit-font-smoothing:antialiased;
  }
  /* Fluid gutter: 24px on a desktop, tightening to 14px on a phone, no breakpoint needed. */
  .shell{max-width:1800px;margin:0 auto;padding:0 clamp(14px,2vw,24px) 48px}

  /* ---------------- header ---------------- */
  header{background:var(--brand);color:#fff}
  .hdr{max-width:1800px;margin:0 auto;padding:clamp(16px,1.6vw,20px) clamp(14px,2.4vw,32px);display:flex;flex-wrap:wrap;gap:16px 22px;align-items:flex-start;justify-content:space-between}
  .brandblk{display:flex;align-items:center;gap:15px;min-width:0}
  .btext{min-width:0}
  /* logo mark — inline SVG, no external asset, so the file stays self-contained */
  .logo{
    flex:none;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;
    background:linear-gradient(158deg,#2A4470 0%,#1A2C4A 100%);
    border:1px solid #37527E;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 5px 14px rgba(0,0,0,.28);
  }
  .logo svg{width:25px;height:25px;color:#DCE6F2}
  .logo .lg-item{color:#6FB4EF}          /* the item — the one accent note */
  .logo .lg-arc{color:#F0F5FA}
  .brandblk h1{margin:0 0 5px;font-size:clamp(16px,1.1vw + 9px,21px);letter-spacing:-.2px;font-weight:650}
  .meta{margin:0;font-size:12.5px;color:#A9BAD0}
  .meta b{color:#DCE6F2;font-weight:600}
  .disc{margin:7px 0 0;font-size:12px;color:#8299B7;border-left:2px solid #3B537A;padding-left:9px}
  .acts{display:flex;gap:8px;flex-wrap:wrap}
  .btn{
    font:inherit;font-size:13px;font-weight:550;border-radius:8px;border:1px solid #3B537A;
    background:#20355A;color:#E8EEF6;padding:8px 13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 2px 6px rgba(0,0,0,.18);
    transition:background .16s ease,transform .12s ease,border-color .16s ease,box-shadow .16s ease;
  }
  .btn svg{width:15px;height:15px;flex:none;display:block}
  .btn:hover{
    background:var(--brand-3);border-color:#4E6798;transform:translateY(-1px);
    box-shadow:0 1px 0 rgba(255,255,255,.08) inset, 0 5px 12px rgba(0,0,0,.26);
  }
  .btn:active{transform:translateY(0);box-shadow:0 1px 3px rgba(0,0,0,.22) inset}
  .btn:focus-visible{outline:2px solid #6FB4EF;outline-offset:2px}
  #b-refresh:hover svg{transform:rotate(-40deg)}
  #b-refresh svg{transition:transform .3s ease}
  #b-csv:hover svg{transform:translateY(1px)}
  #b-csv svg{transition:transform .2s ease}

  /* ---------------- tabs ---------------- */
  /* tab strip sits on a band one step lighter than the header */
  .tabstrip{background:var(--brand-2);border-top:1px solid #2A4470}
  /* The tab strip scrolls sideways rather than wrapping — four tabs on two lines
     reads as a broken nav. Scrollbar hidden; scroll-snap keeps a tab flush to the edge. */
  .tabs{
    max-width:1800px;margin:0 auto;padding:12px clamp(14px,2.4vw,32px);
    display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;scroll-snap-type:x proximity;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{scroll-snap-align:start;flex:none}
  .tab{
    position:relative;font:inherit;font-size:13.5px;font-weight:550;white-space:nowrap;cursor:pointer;
    background:transparent;border:0;color:#93A7C1;padding:12px 22px;border-radius:9px;
    transition:color .16s ease,background .16s ease;
  }
  .tab .plat{
    display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    padding:2px 6px;border-radius:4px;background:#33507F;color:#C2D2E6;margin-right:8px;vertical-align:1px;
    transition:background .16s ease,color .16s ease;
  }
  .tab:hover{color:#DCE6F2;background:rgba(255,255,255,.07)}
  .tab[aria-selected="true"]{background:var(--surface-2);color:var(--ink)}
  .tab[aria-selected="true"] .plat{background:var(--tab-plat);color:#fff}

  /* ---------------- KPI ---------------- */
  /* Cards fit themselves to the width — 6 across on a desktop, folding to 3, 2 and
     finally 1 as the viewport narrows, with no breakpoint doing the arithmetic. */
  .kpis{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:clamp(10px,1vw,14px);margin:clamp(14px,1.8vw,22px) 0 0;
  }
  .kpi{
    position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--kpi-a) 0%,var(--kpi-b) 100%);
    border:1px solid var(--line);border-radius:12px;
    padding:12px 16px 11px 18px;
    /* bottom-weighted shadow: the card reads as lifted off the page, not outlined */
    box-shadow:var(--card-sh);
    transition:transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .2s ease,border-color .18s ease;
  }
  /* brand accent rail — the one flash of colour, keeps the row tied to the header */
  .kpi::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(180deg,var(--brand) 0%,var(--accent) 100%);
  }
  /* soft inner highlight along the top edge — gives the surface a slight sheen */
  .kpi::after{
    content:"";position:absolute;left:3px;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--sheen),transparent);
  }
  .kpi:hover{
    transform:translateY(-3px);border-color:var(--line);
    box-shadow:var(--card-sh-h);
  }
  .kpi .k{
    margin:0 0 5px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink-3);display:flex;align-items:center;gap:6px;line-height:1.2;
  }
  .kpi .k::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--ink-3);opacity:.55;flex:none}
  .kpi .v{
    font-size:clamp(19px,.7vw + 14px,23px);font-weight:660;letter-spacing:-.7px;line-height:1.15;
    font-variant-numeric:tabular-nums;color:var(--kpi-v);
  }
  .kpi .v.sm{font-size:13.5px;font-weight:600;line-height:1.25;letter-spacing:0;word-break:break-word}
  .kpi .s{margin-top:2px;font-size:11px;color:var(--ink-3);line-height:1.3}

  /* ---------------- filters ---------------- */
  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    margin:14px 0 0;box-shadow:var(--shadow);overflow:hidden;
  }
  /* toolbar band — sits above the table, visually distinct from both header and rows */
  .filters{
    display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
    padding:16px 18px;background:var(--toolbar);border-bottom:1px solid var(--line);
  }
  .f{display:flex;flex-direction:column;gap:6px}
  .f label{
    font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);
    display:flex;align-items:center;gap:5px;
  }
  .f input,.f select{
    font:inherit;font-size:13px;height:38px;padding:0 11px;
    border:1px solid var(--line);border-radius:8px;
    background:var(--surface);color:var(--ink);
    box-shadow:0 1px 2px rgba(21,36,61,.04);
    transition:border-color .16s ease,box-shadow .16s ease,background .16s ease;
  }
  .f input::placeholder{color:var(--ink-3);opacity:.75}
  .f input:hover,.f select:hover{border-color:#B9C8DA}
  .f input:focus,.f select:focus{
    outline:0;border-color:var(--accent);background:var(--surface);
    box-shadow:0 0 0 3px var(--focus-ring);
  }
  .f select{cursor:pointer;padding-right:8px}

  /* search field, with the magnifier inside the input */
  .f.grow{flex:1;min-width:260px}
  .sbox{position:relative;display:flex}
  .sbox input{width:100%;padding-left:36px}
  .sico{
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;color:var(--ink-3);pointer-events:none;
  }
  .sbox input:focus + .sico,.sbox input:not(:placeholder-shown) + .sico{color:var(--accent)}

  .f.num input{width:112px}
  .f.sel select{min-width:158px}
  .spacer{flex:1}

  .clear{
    font:inherit;font-size:12.5px;font-weight:550;height:38px;
    background:var(--surface);border:1px solid var(--line);
    color:var(--ink-2);padding:0 13px;border-radius:8px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
    box-shadow:0 1px 2px rgba(21,36,61,.04);
    transition:background .16s ease,color .16s ease,border-color .16s ease;
  }
  .clear svg{width:13px;height:13px;flex:none}
  .clear:hover{background:var(--soft-hover);color:var(--ink);border-color:#B9C8DA}

  /* ---------------- table ---------------- */
  /* Column widths are declared once, per table, in a <colgroup> built from the
     TABS column defs. table-layout:fixed makes the browser honour them exactly
     instead of re-fitting columns to their content — that is what keeps the four
     tables aligned with each other. min-width keeps the columns from being
     crushed on narrow screens; .twrap scrolls horizontally instead. */
  /* Between the phone card layout and the full desktop table there is a band where
     the table keeps all its columns but has to scroll sideways. These edge shadows
     appear only when there is actually more table to reach — they are painted by
     two fixed (scroll-attached) radial gradients that the two "local" linear
     gradients cover up whenever the content is scrolled to that end. Without them a
     scrollable table looks simply truncated. */
  .twrap{
    overflow-x:auto;max-height:none;
    background:
      linear-gradient(to right,  var(--surface) 40%, rgba(255,255,255,0)) left  center / 44px 100% no-repeat local,
      linear-gradient(to left,   var(--surface) 40%, rgba(255,255,255,0)) right center / 44px 100% no-repeat local,
      radial-gradient(farthest-side at   0% 50%, var(--scroll-sh), transparent) left  center / 15px 100% no-repeat scroll,
      radial-gradient(farthest-side at 100% 50%, var(--scroll-sh), transparent) right center / 15px 100% no-repeat scroll;
  }
  /* 1560px is the width at which the narrowest headers (Marketplace 6.6%, Return
     Count 7.6%) still fit on one line. Below it the table scrolls sideways rather
     than wrapping "MARKETPLACE" mid-word. */
  table{border-collapse:separate;border-spacing:0;width:100%;min-width:1560px;table-layout:fixed;font-size:13.5px}
  thead th{
    position:sticky;top:0;z-index:2;
    text-align:left;font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--th-ink);background:var(--th-bg);padding:0 10px;height:52px;
    /* The narrow columns (Marketplace 6.6%, Currency 5.7%) only hold their header on
       one line at this type size — hence 10px/.04em and the 1400px table floor below.
       Wrapping stays enabled as a safety net so a header can never clip; break-word is
       a last resort that only triggers below the floor. */
    white-space:normal;line-height:1.2;overflow-wrap:break-word;vertical-align:middle;
    border-bottom:2px solid var(--line);
    -webkit-user-select:none;  /* Safari 3+, Safari on iOS 3+ */
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
    transition:background .14s ease,color .14s ease;
  }
  /* Only Return Count and Refund are sortable — they alone look and behave clickable. */
  thead th[data-sort]{cursor:pointer}
  thead th[data-sort]:hover{background:var(--th-hover);color:var(--ink)}
  thead th.nosort{cursor:default}
  thead th:first-child{border-radius:0}
  thead th .arw{display:inline-block;margin-left:6px;opacity:.3;font-size:9px;transition:opacity .14s,transform .14s}
  thead th[data-sort]:hover .arw{opacity:.7}
  /* the sorted column reads as a lit lane */
  thead th.sorted{color:var(--ink);background:var(--th-sorted);box-shadow:inset 0 3px 0 var(--accent)}
  thead th.sorted .arw{opacity:1}
  th.r,td.r{text-align:right}

  /* One alignment system for every table: text left, numbers right, dates and
     badges centred. Applied to the th and the td from the same column def, so a
     header can never drift out of alignment with the cells beneath it. */
  th.al-l,td.al-l{text-align:left}
  th.al-r,td.al-r{text-align:right}
  th.al-c,td.al-c{text-align:center}

  /* Identical box metrics on every cell in every table — header 52px, body rows
     a uniform 44px, same 14px horizontal padding throughout. */
  tbody td{
    padding:0 10px;height:44px;border-bottom:1px solid var(--line-2);vertical-align:middle;
  }
  /* Fixed layout clips overflow, so long free-text values (SKUs, reasons) must be
     allowed to break rather than spill into the next column. */
  td.tx{overflow-wrap:anywhere;line-height:1.35;padding-top:8px;padding-bottom:8px}
  tbody tr{transition:background .12s ease}
  tbody tr:nth-child(even){background:var(--surface-3)}
  tbody tr.hot{background:var(--hot);box-shadow:inset 3px 0 0 var(--hot-edge)}
  tbody tr:hover{background:var(--row-hover)}
  tbody tr.hot:hover{background:var(--hot-hover)}
  tbody tr:last-child td{border-bottom:0}
  .rk{color:var(--ink-3);font-variant-numeric:tabular-nums}
  .rk.top{color:var(--hot-edge);font-weight:700}
  .money{font-weight:650;font-variant-numeric:tabular-nums;white-space:nowrap}
  .n{font-variant-numeric:tabular-nums;white-space:nowrap}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px}
  .rsn{font-weight:600}
  .mut{color:var(--ink-3)}
  .chip{
    display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;
    background:var(--chip-bg);color:var(--chip-ink);white-space:nowrap;
  }
  .unattr{color:var(--hot-edge);font-style:italic}
  .nowrap{white-space:nowrap}
  /* width now comes from the colgroup, not from here — the bar just fills its column */
  /* The bar must NOT grow. It used to be flex:1, which made it the only elastic
     thing in the table — so any change to any column width was swallowed by the
     bar stretching, and the spacing never moved. flex:0 1 110px means: never grow
     (spare width in the column becomes real spacing), but still shrink if the
     column is made narrow (so it can't overflow). The bar + label form a fixed
     block pinned to the right, under the right-aligned header. */
  .bar{display:flex;align-items:center;gap:9px;justify-content:flex-end}
  .trk{flex:0 1 110px;height:6px;background:var(--track);border-radius:4px;overflow:hidden;min-width:40px}
  .fil{height:100%;background:var(--accent);border-radius:0 4px 4px 0}
  .pct{font-variant-numeric:tabular-nums;color:var(--ink-2);font-size:12.5px;width:44px;text-align:right;flex:none}
  .none{padding:44px 16px;text-align:center;color:var(--ink-3)}

  /* ---------------- pagination ---------------- */
  .pg{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:12px 16px;background:var(--surface-3);border-top:1px solid var(--line)}
  .pg .info{font-size:12.5px;color:var(--ink-2)}
  .pg .grow{flex:1}
  /* Rows-per-page picker. Styled to match the filter selects above the table —
     same border, radius, shadow, hover and focus ring — just a compact 32px tall
     to sit properly in the footer band beside the page buttons. It inherits the
     native caret (no appearance:none), so the arrow follows the light/dark theme
     on its own via the color-scheme declaration on <html>. */
  .pg select{
    font:inherit;font-size:12.5px;font-weight:550;
    height:32px;min-width:74px;padding:0 6px 0 9px;
    border:1px solid var(--line);border-radius:7px;
    background:var(--surface);color:var(--ink);cursor:pointer;
    box-shadow:0 1px 2px rgba(21,36,61,.04);
    transition:border-color .16s ease,box-shadow .16s ease,background .16s ease;
  }
  .pg select:hover{border-color:#B9C8DA;background:var(--soft-hover)}
  .pg select:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring)}
  .pgbtns{display:flex;gap:4px;flex-wrap:wrap}
  .pgb{
    font:inherit;font-size:12.5px;min-width:32px;padding:5px 9px;border:1px solid var(--line);
    background:var(--surface);color:var(--ink-2);border-radius:6px;cursor:pointer;
    transition:background .14s ease,color .14s ease,border-color .14s ease;
  }
  .pgb:hover:not(:disabled){background:var(--soft-hover);color:var(--ink);border-color:var(--line)}
  .pgb[aria-current="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}
  .pgb:disabled{opacity:.4;cursor:default}
  .pgb.dots{border:0;background:transparent;cursor:default;min-width:18px;padding:5px 2px}

  /* ---------------- misc ---------------- */
  .panels > section{display:none;animation:fade .18s ease}
  .panels > section.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .scope{
    margin:16px 0 0;padding:9px 14px;background:var(--chip-bg);border:1px solid var(--line);border-radius:8px;
    font-size:12.5px;color:var(--chip-ink);
  }
  .scope b{font-weight:650}

  footer{margin-top:28px;display:flex;flex-wrap:wrap;gap:8px 20px;font-size:12px;color:var(--ink-3)}
  footer span{display:flex;align-items:center;gap:6px}
  footer span::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--ink-3)}

  #toast{
    position:fixed;left:50%;bottom:26px;transform:translate(-50%,14px);
    background:var(--brand);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;
    box-shadow:0 8px 28px rgba(21,36,61,.3);opacity:0;pointer-events:none;transition:.22s;max-width:92vw;z-index:50;
  }
  #toast.show{opacity:1;transform:translate(-50%,0)}

  /* ================= responsive =================
     Three regimes, in order of viewport width:

       ≥1100px  full fixed-width table, everything on one line
       660–1100 table keeps its columns but scrolls sideways inside .twrap;
                chrome (header, filters, pager) reflows to stacked blocks
       <660px   the table stops being a table: each row restacks as a labelled
                card. Below ~660px ten columns cannot be shown legibly at any
                zoom, and a horizontally-scrolling table on a phone hides the
                very columns (refund, reason) the report exists to show.

     The phone Sort control appears only in the third regime, where the sortable
     table headers are gone. */

  /* the sort select is desktop-redundant — the headers already sort */
  .f.sortf{display:none}

  @media (max-width:1100px){
    .filters{padding:13px 14px;gap:11px}
    .f.grow{flex:1 1 100%;min-width:0}      /* search takes its own line */
    .f.sel select{min-width:0;width:100%}
    .f.num{flex:1 1 130px}
    .f.num input{width:100%}
    .spacer{display:none}
  }

  @media (max-width:860px){
    .hdr{flex-direction:column;align-items:stretch}
    .acts{width:100%}
    .acts .btn{flex:1 1 auto;justify-content:center}
    .acts .btn.ico{flex:0 0 auto}
    .logo{width:40px;height:40px;border-radius:11px}
    .logo svg{width:22px;height:22px}
    .tab{padding:10px 15px;font-size:12.5px}
    .disc{font-size:11.5px}
    .f{flex:1 1 calc(50% - 6px);min-width:0}
    .clear{flex:1 1 100%;justify-content:center}
    .pg{justify-content:center}
    .pg .grow{display:none}
    footer{gap:6px 14px}
  }

  @media (max-width:660px){
    /* the table headers are hidden below, so sorting has to live somewhere else */
    .f.sortf{display:flex;flex:1 1 100%}
    .f.sortf select{width:100%}

    /* ---- table → cards ---- */
    .twrap{overflow-x:visible;background:none}   /* nothing scrolls, so no edge shadows */
    table{display:block;min-width:0;table-layout:auto;font-size:13px}
    thead{display:none}                      /* headers move into each cell, below */
    tbody{display:block;padding:12px}        /* breathing room around the card stack */
    tbody tr{
      display:block;margin:0 0 10px;border:1px solid var(--line);border-radius:10px;
      background:var(--surface);overflow:hidden;box-shadow:var(--shadow);
    }
    tbody tr:nth-child(even){background:var(--surface)}   /* zebra is meaningless once rows are cards */
    tbody tr:hover{background:var(--surface)}
    tbody tr.hot{background:var(--hot);border-color:var(--hot-edge)}
    tbody tr.hot:hover{background:var(--hot)}
    tbody tr:last-child td{border-bottom:1px solid var(--line-2)}

    /* every cell becomes a label/value line */
    tbody td{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      height:auto;min-height:40px;padding:8px 13px;text-align:right;
      border-bottom:1px solid var(--line-2);
    }
    tbody td::before{
      content:attr(data-label);
      flex:0 0 auto;max-width:46%;text-align:left;
      font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
      color:var(--ink-3);line-height:1.25;
    }
    tbody tr td:last-child{border-bottom:0}
    td.tx{padding-top:9px;padding-bottom:9px;text-align:right}

    /* the rank reads as the card's title bar rather than another data row */
    tbody td.rk{
      background:var(--surface-3);min-height:0;padding:7px 13px;
      font-weight:700;color:var(--ink);
    }
    tbody tr.hot td.rk{background:transparent;color:var(--hot-edge)}

    /* In card mode the cell is narrow, so the track must be free to shrink —
       flex:0 1 110px already allows that; it just needs a min-width it can reach. */
    .bar{flex:1;justify-content:flex-end;min-width:0}
    .trk{min-width:34px}

    .kpi{padding:11px 14px 10px 16px}
    .scope{font-size:12px;padding:9px 12px}
    .pgbtns{gap:3px}
    .pgb{min-width:30px;padding:5px 7px}
  }

  @media (max-width:480px){
    .f{flex:1 1 100%}
    /* icon-only actions when space is tight — each button carries an aria-label,
       so hiding the visible text does not strip its accessible name */
    .acts .btn:not(.ico) > span{
      position:absolute;width:1px;height:1px;overflow:hidden;
      clip-path:inset(50%);white-space:nowrap;
    }
    /* :not(.ico) matters — the theme toggle has no label to hide, and zeroing its
       side padding would crush it to a sliver */
    .acts .btn:not(.ico){flex:1 1 auto;padding:9px 0;justify-content:center}
  }

  .btn.ico{padding:7px 10px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
  .btn.ico svg{width:18px;height:18px;display:block;transition:transform .25s ease}
  .btn.ico:hover svg{transform:rotate(-15deg) scale(1.06)}

  /* print always uses the light palette — dark mode would waste ink and read badly on paper */
  @media print{
    :root, :root[data-theme="dark"]{
      --ink:#16202C; --ink-2:#54657A; --ink-3:#8A9AAB;
      --surface:#FFFFFF; --surface-2:#F4F6F9; --surface-3:#FAFBFC;
      --line:#DEE4EC; --line-2:#EDF1F5;
      --hot:#FDECEC; --hot-edge:#C0392B;
      --kpi-a:#FFFFFF; --kpi-b:#F9FBFC; --kpi-v:#15243D;
      --chip-bg:#EAF0F7; --chip-ink:#1E3355; --track:#E8EDF3;
      --th-sorted:#E9EFF6; --accent:#2E6DA4; --th-bg:#ECF1F7; --th-ink:#3F5169; --toolbar:#F7F9FC;
    }
    body{background:#fff}
    .acts,.tabs,.filters,.pg,#toast,.scope{display:none !important}
    header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .panels > section{display:none !important}
    .panels > section.on{display:block !important}
    .panel,.kpi{box-shadow:none;break-inside:avoid}
    thead th{position:static}
    tbody tr.hot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .twrap{overflow:visible}
  }
</style>
</head>

    R.ebySkus[c]    = (DATA.EBAY_SKUS[c]     ||[]).map((r,i)=>({rank:i+1, sku:r[0], count:r[1], refund:r[2], topReason:r[3], units:r[4], mkt:r[5], last:r[6], ccy:c}));
  }
  return R;
}
const REC = build();

/* ---------- tab definitions ---------- */
/* Column layout is declared once here and drives everything: the <colgroup> width,
   the header alignment and the cell alignment all read from the same def, so a
   header can never drift away from the column under it.

     w  = width, as a % of table width. Each table's widths sum to exactly 100.
     al = alignment — l(eft) for text, r(ight) for numbers, c(entre) for dates
          and badges.

   The two Reasons tables share one width set; the two SKU tables share another.
   eBay has no ASIN (Amazon-only identifier), so its SKU table has 9 columns to
   Amazon's 10 — the freed ASIN width is handed to its SKU column, which leaves
   every *shared* column identical in width across both SKU tables. */
const TABS = [
  { id:"t1", plat:"Amazon", name:"Return Reasons Summary", src:"amzReasons", kind:"reason",
    cols:[
      {k:"rank",   label:"#",                 cls:"rk",     type:"rank",  w:4,  al:"c"},
      {k:"reason", label:"Reason",            cls:"rsn",    type:"text",  w:18, al:"l"},
      {k:"count",  label:"Return Count",      cls:"n",      type:"num",   w:8,  al:"r", sort:true},
      {k:"units",  label:"Units",             cls:"n",      type:"units", w:11, al:"r"},
      {k:"pct",    label:"% of Return Count", cls:"barw",   type:"bar",   w:16, al:"r"},
      {k:"refund", label:"Refunded Amount",   cls:"money",  type:"money", w:16, al:"r", sort:true},
      {k:"last",   label:"Last Return",       cls:"mut",    type:"date",  w:14, al:"c"},
      {k:"ccy",    label:"Currency",          cls:"",       type:"chip",  w:13, al:"c"}
    ]},
  { id:"t2", plat:"Amazon", name:"SKU Refund Analysis", src:"amzSkus", kind:"sku",
    cols:[
      {k:"rank",     label:"#",            cls:"rk",      type:"rank",  w:3.8,  al:"c"},
      {k:"sku",      label:"SKU",          cls:"mono",    type:"text",  w:24.5, al:"l"},
      {k:"asin",     label:"ASIN",         cls:"mono mut",type:"text",  w:11.3, al:"l"},
      {k:"mkt",      label:"Marketplace",  cls:"",        type:"chip2", w:6.6,  al:"c"},
      {k:"count",    label:"Return Count", cls:"n",       type:"num",   w:7.6,  al:"r", sort:true},
      {k:"units",    label:"Units",        cls:"n",       type:"units", w:6.6,  al:"r"},
      {k:"refund",   label:"Refund Value", cls:"money",   type:"money", w:11.3, al:"r", sort:true},
      {k:"topReason",label:"Top Reason",   cls:"mut",     type:"text",  w:13.2, al:"l"},
      {k:"last",     label:"Last Return",  cls:"mut",     type:"date",  w:9.4,  al:"c"},
      {k:"ccy",      label:"Currency",     cls:"",        type:"chip",  w:5.7,  al:"c"}
    ]},
  { id:"t3", plat:"eBay", name:"Return Reasons Summary", src:"ebyReasons", kind:"reason",
    cols:[
      {k:"rank",   label:"#",                 cls:"rk",     type:"rank",  w:4,  al:"c"},
      {k:"reason", label:"Reason",            cls:"rsn",    type:"text",  w:18, al:"l"},
      {k:"count",  label:"Return Count",      cls:"n",      type:"num",   w:8,  al:"r", sort:true},
      {k:"units",  label:"Units",             cls:"n",      type:"units", w:11, al:"r"},
      {k:"pct",    label:"% of Return Count", cls:"barw",   type:"bar",   w:16, al:"r"},
      {k:"refund", label:"Refund",            cls:"money",  type:"money", w:16, al:"r", sort:true},
      {k:"last",   label:"Last Return",       cls:"mut",    type:"date",  w:14, al:"c"},
      {k:"ccy",    label:"Currency",          cls:"",       type:"chip",  w:13, al:"c"}
    ]},
  { id:"t4", plat:"eBay", name:"SKU Refund Analysis", src:"ebySkus", kind:"sku",
    cols:[
      {k:"rank",     label:"#",            cls:"rk",    type:"rank",  w:3.8,  al:"c"},
      {k:"sku",      label:"SKU",          cls:"mono",  type:"text",  w:35.8, al:"l"},  /* 24.5 + eBay's unused ASIN 11.3 */
      {k:"mkt",      label:"Marketplace",  cls:"",      type:"chip2", w:6.6,  al:"c"},
      {k:"count",    label:"Return Count", cls:"n",     type:"num",   w:7.6,  al:"r", sort:true},
      {k:"units",    label:"Units",        cls:"n",     type:"units", w:6.6,  al:"r"},
      {k:"refund",   label:"Refund",       cls:"money", type:"money", w:11.3, al:"r", sort:true},
      {k:"topReason",label:"Top Reason",   cls:"mut",   type:"text",  w:13.2, al:"l"},
      {k:"last",     label:"Last Return",  cls:"mut",   type:"date",  w:9.4,  al:"c"},
      {k:"ccy",      label:"Currency",     cls:"",      type:"chip",  w:5.7,  al:"c"}
    ]}
];

/* ---------- per-tab UI state ---------- */
const ST = {};
TABS.forEach(t => ST[t.id] = {
  ccy:"GBP", q:"", reason:"", minR:"", maxR:"", minC:"",
  sortKey:"refund", sortDir:"desc", page:1, per:25
});
let ACTIVE = TABS[0].id;

/* ---------- helpers ---------- */
const $  = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const money = (v,c) => (SYM[c]||"") + Number(v).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
const int   = v => Number(v).toLocaleString("en-GB");
const units = v => Number(v) % 1 === 0
  ? Number(v).toLocaleString("en-GB")
  : Number(v).toLocaleString("en-GB",{minimumFractionDigits:1,maximumFractionDigits:1});
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmtDate = v => {
  if(!v) return "—";
  const [y,m,d] = String(v).split("-");
  return `${Number(d)} ${MONTHS[Number(m)-1]} ${y}`;
};

function rowsFor(tab){ return REC[tab.src][ST[tab.id].ccy] || []; }

function filtered(tab){
  const s = ST[tab.id];
  const q = s.q.trim().toLowerCase();
  const minR = s.minR === "" ? -Infinity : parseFloat(s.minR);
  const maxR = s.maxR === "" ?  Infinity : parseFloat(s.maxR);
  const minC = s.minC === "" ? -Infinity : parseFloat(s.minC);

  let out = rowsFor(tab).filter(r => {
    if(r.refund < minR || r.refund > maxR) return false;
    if(r.count  < minC) return false;
    if(s.reason && (r.reason ?? r.topReason) !== s.reason) return false;
    if(q){
      const hay = [r.sku, r.asin, r.reason, r.topReason, r.ccy].filter(Boolean).join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  const k = s.sortKey, dir = s.sortDir === "asc" ? 1 : -1;
  out = out.slice().sort((a,b) => {
    const x = a[k], y = b[k];
    if(typeof x === "number" && typeof y === "number"){
      if(x !== y) return (x - y) * dir;
    } else {
      const c = String(x ?? "").localeCompare(String(y ?? ""));
      if(c !== 0) return c * dir;
    }
    return a.rank - b.rank;   // stable, deterministic tie-break
  });
  return out;
}

/* ---------- KPI ---------- */
function kpiHtml(tab, rows){
  const c = ST[tab.id].ccy;
  const totalReturns = rows.reduce((a,r)=>a+r.count, 0);
  const totalRefund  = rows.reduce((a,r)=>a+r.refund, 0);
  const avg          = totalReturns ? totalRefund/totalReturns : 0;
  const uniqReason   = new Set(rows.map(r => r.reason ?? r.topReason)).size;
  const largest      = rows.reduce((a,r)=>Math.max(a, r.refund), 0);

  const cards = [
    {k:"Total Returns",  v:int(totalReturns),    s:"return records"},
    {k:"Total Refund",   v:money(totalRefund,c), s:c === "UNSPECIFIED" ? "currency not recorded" : c},
    {k:"Average Refund", v:money(avg,c),         s:"per return"}
  ];
  // "Unique SKUs" only exists on the SKU tabs — the Reasons tabs have no SKU column.
  if(tab.kind === "sku")
    cards.push({k:"Unique SKUs", v:int(new Set(rows.map(r=>r.sku)).size), s:"distinct SKUs"});
  cards.push(
    {k:"Unique Reasons", v:int(uniqReason), s:"distinct reasons"},
    {k:"Largest Refund", v:money(largest,c), s:"single row"}
  );

  return {
    n: cards.length,
    html: cards.map(x =>
      `<div class="kpi"><p class="k">${x.k}</p><div class="v">${x.v}</div><div class="s">${x.s}</div></div>`
    ).join("")
  };
}

/* ---------- table ---------- */
function cell(col, r, maxPct){
  const v = r[col.k];
  const a = col.al ? `al-${col.al}` : "";   // same alignment the header uses
  // data-label carries the column name into the cell. On phones the header row is
  // hidden and each row restacks into a card — the label is then shown by the
  // td::before rule, so no cell is ever left as an unlabelled number.
  const L = `data-label="${esc(col.label)}"`;
  switch(col.type){
    case "rank":  return `<td ${L} class="rk ${a} ${r.rank<=3?"top":""}">${r.rank}</td>`;
    case "num":   return `<td ${L} class="${col.cls} ${a}">${int(v)}</td>`;
    case "money": return `<td ${L} class="${col.cls} ${a}">${money(v, r.ccy)}</td>`;
    case "chip":  return `<td ${L} class="${a}"><span class="chip">${esc(v)}</span></td>`;
    case "chip2": return `<td ${L} class="${a}">${v ? `<span class="chip mkt">${esc(v)}</span>` : `<span class="mut">—</span>`}</td>`;
    // eBay units are split across variation listings the same way refunds are,
    // so a row can hold a fraction of a unit. Show the decimal only when there is one.
    case "units": return `<td ${L} class="${col.cls} ${a}">${units(v)}</td>`;
    case "date":  return `<td ${L} class="${col.cls} ${a} nowrap">${fmtDate(v)}</td>`;
    case "bar":{
      const w = maxPct > 0 ? Math.max(v/maxPct*100, 1.5) : 0;
      return `<td ${L} class="barw ${a}"><div class="bar"><div class="trk"><div class="fil" style="width:${w.toFixed(1)}%"></div></div><span class="pct">${Number(v).toFixed(1)}%</span></div></td>`;
    }
    default:{
      const un = typeof v === "string" && v.startsWith("(UNATTRIBUTED");
      // tx lets a long SKU or reason wrap inside its fixed-width column
      // instead of spilling over the one beside it.
      return `<td ${L} class="${col.cls} ${a} tx ${un?"unattr":""}" title="${esc(v ?? "")}">${esc(v ?? "—")}</td>`;
    }
  }
}

/* If a table's widths do not add up to 100, the browser silently rescales EVERY
   column to make them fit — so editing one column appears to move all the others
   and nothing lands where you set it. Warn instead of failing quietly. */
TABS.forEach(t => {
  const sum = t.cols.reduce((a, c) => a + c.w, 0);
  if(Math.abs(sum - 100) > 0.05)
    console.warn(`[${t.id}] column widths total ${sum.toFixed(1)}%, not 100% — ` +
                 `the browser will rescale every column proportionally. Adjust so they sum to 100.`);
});

function tableHtml(tab, rows, pageRows){
  const s = ST[tab.id];
  const maxPct = rows.length ? Math.max(...rows.map(r => r.pct ?? 0)) : 0;

  // Fixed column widths, straight from the column defs — this is what keeps the
  // four tables consistent with one another.
  const group = `<colgroup>${tab.cols.map(c => `<col style="width:${c.w}%">`).join("")}</colgroup>`;

  // Only the count and refund columns are sortable. The rest (rank, SKU, ASIN,
  // reason, %, currency) render as plain, non-interactive headers.
  const head = tab.cols.map(c => {
    const a = c.al ? `al-${c.al}` : "";
    if(!c.sort) return `<th class="${a} nosort">${esc(c.label)}</th>`;
    const on = s.sortKey === c.k;
    const ar = on ? (s.sortDir === "asc" ? "▲" : "▼") : "▾";
    return `<th class="${a} ${on?"sorted":""}" data-sort="${c.k}" title="Sort by ${esc(c.label)}">${esc(c.label)}<span class="arw">${ar}</span></th>`;
  }).join("");

  if(!pageRows.length)
    return `<table>${group}<thead><tr>${head}</tr></thead></table>
            <div class="none">No records match the current filters.</div>`;

  const body = pageRows.map(r =>
    `<tr class="${r.rank<=3?"hot":""}">${tab.cols.map(c => cell(c, r, maxPct)).join("")}</tr>`
  ).join("");
  return `<table>${group}<thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

/* ---------- pagination ---------- */
function pageSlice(tab, rows){
  const s = ST[tab.id];
  if(s.per === "all") return rows;
  const per = Number(s.per);
  const pages = Math.max(1, Math.ceil(rows.length/per));
  if(s.page > pages) s.page = pages;
  const st = (s.page-1)*per;
  return rows.slice(st, st+per);
}

function pagerHtml(tab, rows){
  const s = ST[tab.id];
  const total = rows.length;
  const per = s.per === "all" ? total || 1 : Number(s.per);
  const pages = Math.max(1, Math.ceil(total/per));
  const from = total ? (s.per==="all" ? 1 : (s.page-1)*per + 1) : 0;
  const to   = s.per==="all" ? total : Math.min(s.page*per, total);

  let btns = "";
  if(s.per !== "all" && pages > 1){
    const push = (p,l,cur,dis)=> btns += `<button class="pgb" data-page="${p}" ${cur?'aria-current="true"':""} ${dis?"disabled":""}>${l}</button>`;
    push(s.page-1, "‹", false, s.page===1);
    const win = new Set([1, pages, s.page, s.page-1, s.page+1]);
    if(s.page<=3) [2,3,4].forEach(p=>win.add(p));
    if(s.page>=pages-2) [pages-1,pages-2,pages-3].forEach(p=>win.add(p));
    const list = [...win].filter(p=>p>=1&&p<=pages).sort((a,b)=>a-b);
    let prev = 0;
    for(const p of list){
      if(prev && p - prev > 1) btns += `<button class="pgb dots" disabled>…</button>`;
      push(p, String(p), p===s.page, false);
      prev = p;
    }
    push(s.page+1, "›", false, s.page===pages);
  }

  return `<div class="pg">
      <span class="info">Showing <b>${int(from)}–${int(to)}</b> of <b>${int(total)}</b> records</span>
      <span class="grow"></span>
      <span class="info">Rows per page</span>
      <select data-per>
        ${[10,25,50,100].map(n=>`<option value="${n}" ${String(s.per)===String(n)?"selected":""}>${n}</option>`).join("")}
        <option value="all" ${s.per==="all"?"selected":""}>All</option>
      </select>
      <span class="pgbtns">${btns}</span>
    </div>`;
}

/* ---------- filters ---------- */
function filtersHtml(tab){
  const s = ST[tab.id];
  const reasons = [...new Set(rowsFor(tab).map(r => r.reason ?? r.topReason))].sort();
  const rLabel = tab.kind === "sku" ? "Top Reason" : "Reason";
  return `<div class="filters">
    <div class="f sel">
      <label>Currency (scope)</label>
      <select data-f="ccy">${CURRENCIES.map(c=>{
        const n = REC[tab.src][c] ? REC[tab.src][c].length : 0;
        return `<option value="${c}" ${s.ccy===c?"selected":""}>${c==="UNSPECIFIED"?"Not recorded":c} (${n})</option>`;
      }).join("")}</select>
    </div>
    <div class="f grow">
      <label>Search — ${tab.kind==="sku" ? "SKU, ASIN, reason, currency" : "reason, currency"}</label>
      <div class="sbox">
        <input data-f="q" type="text" placeholder="Type to filter live…" value="${esc(s.q)}">
        <svg class="sico" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <circle cx="10.6" cy="10.6" r="6.4" stroke="currentColor" stroke-width="2"/>
          <path d="M15.4 15.4 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="f sel">
      <label>${rLabel}</label>
      <select data-f="reason">
        <option value="">All</option>
        ${reasons.map(r=>`<option value="${esc(r)}" ${s.reason===r?"selected":""}>${esc(r)}</option>`).join("")}
      </select>
    </div>
    <div class="f num"><label>Min refund</label><input data-f="minR" type="number" step="0.01" placeholder="0.00" value="${esc(s.minR)}"></div>
    <div class="f num"><label>Max refund</label><input data-f="maxR" type="number" step="0.01" placeholder="any" value="${esc(s.maxR)}"></div>
    <div class="f num"><label>Min returns</label><input data-f="minC" type="number" step="1" placeholder="0" value="${esc(s.minC)}"></div>
    <!-- Phone-only sort control. On small screens the rows restack as cards and the
         sortable <th>s are hidden, so without this there would be no way to sort at
         all. It drives the same sortKey/sortDir state the header clicks do. -->
    <div class="f sel sortf">
      <label>Sort by</label>
      <select data-sortsel>
        ${tab.cols.filter(c => c.sort).flatMap(c => [
          {k:c.k, d:"desc", t:`${c.label} — high to low`},
          {k:c.k, d:"asc",  t:`${c.label} — low to high`}
        ]).map(o =>
          `<option value="${o.k}:${o.d}" ${s.sortKey===o.k && s.sortDir===o.d ? "selected":""}>${esc(o.t)}</option>`
        ).join("")}
      </select>
    </div>
    <button class="clear" data-clear>
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
        <path d="M5 5l14 14M19 5 5 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Clear filters
    </button>
  </div>`;
}

/* ---------- render ---------- */
function render(){
  $("#tabs").innerHTML = TABS.map(t =>
    `<button class="tab" role="tab" data-tab="${t.id}" aria-selected="${ACTIVE===t.id}">
       <span class="plat">${t.plat}</span>${t.name}
     </button>`).join("");

  $("#panels").innerHTML = TABS.map(t => {
    const rows = filtered(t);
    const page = pageSlice(t, rows);
    const k = kpiHtml(t, rows);
    return `<section id="p-${t.id}" class="${ACTIVE===t.id?"on":""}">
      <div class="kpis" data-n="${k.n}">${k.html}</div>
      <div class="panel" data-panel="${t.id}">
        ${filtersHtml(t)}
        <div class="twrap">${tableHtml(t, rows, page)}</div>
        ${pagerHtml(t, rows)}
      </div>
    </section>`;
  }).join("");

  const t = TABS.find(x => x.id === ACTIVE);
  const s = ST[ACTIVE];
  const n = filtered(t).length, all = rowsFor(t).length;
  $("#scope").innerHTML =
    `<b>${t.plat} — ${t.name}</b> · scoped to <b>${s.ccy === "UNSPECIFIED" ? "currency not recorded" : s.ccy}</b> · ` +
    `showing <b>${int(n)}</b> of <b>${int(all)}</b> records` +
    (n !== all ? ` (filtered)` : ` (all records loaded)`) +
    ` · Amazon and eBay are never combined, and one currency is shown at a time.`;
}

/* ---------- events ---------- */
document.addEventListener("click", e => {
  const tab = e.target.closest("[data-tab]");
  if(tab){ ACTIVE = tab.dataset.tab; render(); return; }

  const th = e.target.closest("th[data-sort]");
  if(th){
    const s = ST[ACTIVE], k = th.dataset.sort;
    if(s.sortKey === k) s.sortDir = s.sortDir === "asc" ? "desc" : "asc";
    else { s.sortKey = k; s.sortDir = (k === "refund" || k === "count" || k === "pct") ? "desc" : "asc"; }
    s.page = 1; render(); return;
  }

  const pg = e.target.closest("[data-page]");
  if(pg && !pg.disabled){ ST[ACTIVE].page = Number(pg.dataset.page); render(); return; }

  if(e.target.closest("[data-clear]")){
    Object.assign(ST[ACTIVE], {q:"", reason:"", minR:"", maxR:"", minC:"", page:1});
    render(); return;
  }
});

document.addEventListener("input", e => {
  const f = e.target.closest("[data-f]");
  if(!f) return;
  const s = ST[ACTIVE];
  s[f.dataset.f] = f.value;
  s.page = 1;
  const pos = f.selectionStart;
  render();
  if(f.dataset.f === "q"){
    const again = document.querySelector(`#p-${ACTIVE} [data-f="q"]`);
    if(again){ again.focus(); try{ again.setSelectionRange(pos,pos); }catch(_){} }
  }
});

document.addEventListener("change", e => {
  const per = e.target.closest("[data-per]");
  if(per){ ST[ACTIVE].per = per.value === "all" ? "all" : Number(per.value); ST[ACTIVE].page = 1; render(); return; }
  // phone sort control — writes the same state a header click would
  const so = e.target.closest("[data-sortsel]");
  if(so){
    const [k, d] = so.value.split(":");
    Object.assign(ST[ACTIVE], { sortKey:k, sortDir:d, page:1 });
    render(); return;
  }
  const f = e.target.closest("select[data-f]");
  if(f){ ST[ACTIVE][f.dataset.f] = f.value; ST[ACTIVE].page = 1; render(); }
});

/* ---------- export: the currently visible tab only ---------- */
function csv(){
  const t = TABS.find(x => x.id === ACTIVE);
  const s = ST[ACTIVE];
  const rows = filtered(t);
  const q = v => `"${String(v ?? "").replace(/"/g,'""')}"`;
  const L = [];
  L.push(q(`Returns Reason Hotspot Report — ${t.plat} — ${t.name}`));
  L.push(q(`Generated ${GENERATED_AT} — snapshot, not live`));
  L.push(q(`Currency: ${s.ccy} — Amazon and eBay are never combined; currencies are never summed`));
  L.push(q(`${rows.length} of ${rowsFor(t).length} records (filters applied)`));
  L.push("");
  L.push(t.cols.map(c => q(c.label)).join(","));
  rows.forEach(r => L.push(t.cols.map(c => {
    const v = r[c.k];
    return q(c.type === "money" ? Number(v).toFixed(2) : c.type === "bar" ? Number(v).toFixed(1) : v);
  }).join(",")));

  const blob = new Blob(["﻿" + L.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `returns_${t.plat.toLowerCase()}_${t.kind}_${s.ccy}_${GENERATED_AT}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Exported ${rows.length} visible rows — ${t.plat} ${t.name} (${s.ccy})`);
}

let tid;
function toast(m){
  const el = $("#toast");
  el.textContent = m;
  el.classList.add("show");
  clearTimeout(tid);
  tid = setTimeout(() => el.classList.remove("show"), 3200);
}

/* ---------- boot ---------- */
/* ---------- theme: light / dark ---------- */
const THEME_KEY = "rrhr-theme";
const store = {
  get(){ try { return localStorage.getItem(THEME_KEY); } catch(_) { return null; } },
  set(v){ try { localStorage.setItem(THEME_KEY, v); } catch(_) {} }
};
function systemDark(){
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
}
function currentTheme(){
  return document.documentElement.getAttribute("data-theme") || (systemDark() ? "dark" : "light");
}
/* The icon shows the theme you get by clicking, not the one you are in:
   in dark mode you see the sun, in light mode the moon. */
const THEME_ICON = {
  sun: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
    <circle cx="12" cy="12" r="4.6" fill="#FFC53D"/>
    <g stroke="#FFA51F" stroke-width="1.9" stroke-linecap="round">
      <path d="M12 2.3v2.5M12 19.2v2.5M2.3 12h2.5M19.2 12h2.5
               M5.2 5.2l1.8 1.8M17 17l1.8 1.8M18.8 5.2 17 7M7 17l-1.8 1.8"/>
    </g>
  </svg>`,
  moon: `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
    <path d="M20.3 14.9A8.7 8.7 0 0 1 9.1 3.7 8.7 8.7 0 1 0 20.3 14.9Z" fill="#BBD3F2"/>
    <circle cx="17.3" cy="5.1" r="1.15" fill="#FFD97A"/>
    <circle cx="20.7" cy="8.9" r=".75" fill="#FFD97A"/>
  </svg>`
};
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const i = $("#b-theme-i");
  if(i) i.innerHTML = t === "dark" ? THEME_ICON.sun : THEME_ICON.moon;
  const b = $("#b-theme");
  if(b) b.title = t === "dark" ? "Switch to light mode" : "Switch to dark mode";
}
// honour a saved choice; otherwise follow the OS (and keep following it if it changes)
applyTheme(store.get() || (systemDark() ? "dark" : "light"));
if(window.matchMedia){
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
    if(!store.get()) applyTheme(e.matches ? "dark" : "light");
  });
}
$("#b-theme").addEventListener("click", () => {
  const next = currentTheme() === "dark" ? "light" : "dark";
  applyTheme(next);
  store.set(next);
  toast(next === "dark" ? "Dark mode" : "Light mode");
});

$("#gen").textContent = GENERATED_AT;
$("#b-print").addEventListener("click", () => window.print());
$("#b-csv").addEventListener("click", csv);
$("#b-refresh").addEventListener("click", () => {
  render();
  toast("Re-rendered from embedded data — this file does not re-query PostgreSQL.");
});
render();
</script>
